# Magdeburg Smart City Hackathon — RAG source PDFs
# Each entry: id, title, url, format ("pdf" | "html" | "wikipedia"), note
# Categories follow Simon's brief:
#   strategie, tourismus, kultur, wikipedia, historisch, mmkt, dates, otto, restaurants

strategie:
  - id: isek_2030_plus_full
    title: Integriertes Stadtentwicklungskonzept ISEK 2030+ — Volldokument
    url: https://www.magdeburg.de/Start/B%C3%BCrger-Stadt/Stadtentwicklung-Planen-Bauen/Stadtentwicklung/Integriertes-Stadtentwicklungskonzept-ISEK-2030/
    format: pdf
    note: |
      Strategischer Hauptkompass der Stadt bis 2030 — Wohnungsmarkt, Mobilität,
      Demografie, Klimaschutz, soziale Gerechtigkeit. 108 Seiten, A4.
      Manuell aus dem Browser geladen (Server liefert PDF nur mit Session-Cookie).
  - id: isek_2030_plus_stadtteile
    title: ISEK 2025 — Stadtteile (Broschüre)
    url: https://www.magdeburg.de/Start/B%C3%BCrger-Stadt/Stadtentwicklung-Planen-Bauen/Stadtentwicklung/Integriertes-Stadtentwicklungskonzept-ISEK-2030/
    format: pdf
    note: |
      Begleit-Broschüre zur Stadtteil-Ebene: Leitbilder und Strategien pro
      Stadtteil. 140 Seiten, A4. Ergänzt das ISEK-2030+-Volldokument.
  - id: isek_2030_plus_landing
    title: Integriertes Stadtentwicklungskonzept ISEK 2030+ — Landingpage
    url: https://www.magdeburg.de/index.php?ModID=7&FID=37.19821.1&object=tx%7C37.19821.1
    format: html
    note: |
      Offizielle ISEK-2030+-Seite mit Beschreibung, Geltungsbereich, Kontext.
      Hält die kurze Zusammenfassung; volle Inhalte siehe isek_2030_plus_full.
  - id: kulturstrategie_2030
    title: Kulturstrategie 2030 — Kultur mit allen (einfache Sprache, Webversion)
    url: https://www.magdeburg.de/loadDocument.phtml?ObjSvrID=37&ObjID=44383&ObjLa=1&Ext=PDF
    format: pdf
    note: |
      "Plan B" der Kulturhauptstadt-Bewerbung, beschlossene Langzeitstrategie
      der Stadt. Falls die loadDocument.phtml-URL auch 404 wirft, ist die
      Landingpage https://www.magdeburg.de/Start/Kultur-Sport/Kulturb%C3%BCro/
      der Einstieg.
  - id: tourismuskonzept_2030_landing
    title: Tourismuskonzept Magdeburg 2030 (Landingpage, 198 Maßnahmen)
    url: https://www.magdeburg.de/index.php?ModID=7&FID=115.3694.1&object=tx%7C115.3694.1
    format: html
    note: |
      Beschlossen 2025. Vier Leitlinien (Grüne Freizeitmetropole am Fluss /
      Urbaner Lifestyle / Stadtkunst & Baukultur / Inspirierende Tagungsorte).
      Der Kurzlink /Tourismuskonzept ist tot — diese index.php-URL ist die
      kanonische Adresse.
  - id: smart_city_landingpage
    title: Smart City Magdeburg — städtische Übersicht
    url: https://www.magdeburg.de/Start/B%C3%BCrger-Stadt/Verwaltung-Service/Smart-City/
    format: html
    note: |
      Übersicht aller Smart-City-Aktivitäten der Stadt (Digitalisierungsamt,
      laufende Projekte). HTML-Fallback wenn kein PDF.
  - id: lsa_digital_2030_md
    title: Sachsen-Anhalt Digital 2030 — Geförderte Projekte Raum Magdeburg
    url: https://mid.sachsen-anhalt.de/fileadmin/Bibliothek/Politik_und_Verwaltung/MLV/MID/Digitales/Digitalstrategie/Gef%C3%B6rderte_Projekte/Raum_Magdeburg_barrierefrei.pdf
    format: pdf
    note: |
      Land-Förderprojekte im Raum Magdeburg (Smart-City-Pilotprojekte,
      Verkehrssensorik, Kulturförderung-Digitalisierung). Nützlich für
      "Was passiert smart-mäßig konkret in Magdeburg?"
  - id: smart_cities_modellprojekte_merkblatt
    title: KfW Merkblatt — Modellprojekte Smart Cities (Bundesförderung)
    url: https://www.kfw.de/PDF/Download-Center/F%C3%B6rderprogramme-(Inlandsf%C3%B6rderung)/PDF-Dokumente/6000004472_M_436_Smart_Cities.pdf
    format: pdf
    note: |
      Bundesweiter Förderkontext, hilfreich um zu verstehen, was unter Smart-
      City-Strategie auf Bundesebene gefördert wird.


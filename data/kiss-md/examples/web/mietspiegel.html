<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mietspiegel Magdeburg 2024 — Beispiel</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 1100px; margin: 2rem auto;
           padding: 0 1.25rem; color: #222; }
    h1 { font-size: 1.45rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1.05rem; margin: 0 0 0.5rem 0; color: #1d3557; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .panel { background: #fafafa; border: 1px solid #e5e5ea; border-radius: 8px;
             padding: 1rem 1.1rem; margin-top: 1rem; }
    canvas { width: 100%; max-width: 1000px; }
    .nav { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e5e5ea;
           color: #666; font-size: 0.9rem; }
    code { background: #f1f1f1; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; }
    a { color: #1d3557; }
  </style>
</head>
<body>
  <h1>Mietspiegel Magdeburg 2024</h1>
  <p class="meta" id="meta">…</p>

  <div class="panel">
    <h2>Entwicklung der Nettokaltmiete (50–80 m²) in ausgewählten Stadtteilen</h2>
    <canvas id="chart"></canvas>
  </div>

  <p class="nav">
    Datenquelle: <code>../../../mietspiegel-2024/nach-wohnflaeche.json</code> ·
    Wetter-Beispiel: <a href="./index.html">index.html</a> ·
    Schema: <a href="../../../mietspiegel-2024/README.md">Mietspiegel README</a>
  </p>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script type="module">
    const ds = await fetch('../../../mietspiegel-2024/nach-wohnflaeche.json').then(r => r.json());

    // Fokus: mittlere Wohnflächenklasse, ausgewählte Stadtteile
    const KATEGORIE = '50 bis unter 80 qm';
    const STADTTEILE = ['Altstadt', 'Stadtfeld Ost', 'Sudenburg', 'Buckau', 'Alte Neustadt', 'Neustädter See'];

    const years = ds.meta.years;
    const palette = ['#e63946', '#1d3557', '#2a9d8f', '#f4a261', '#9d4edd', '#6a994e'];

    const datasets = STADTTEILE.map((stadtteil, i) => {
      const data = years.map(y => {
        const row = ds.rows.find(r =>
          r.year === y && r.stadtteil === stadtteil && r.wohnflaechenklasse === KATEGORIE);
        return row?.nettokaltmiete_pro_qm ?? null;
      });
      return { label: stadtteil, data, borderColor: palette[i], backgroundColor: palette[i] + '22',
               tension: 0.25, spanGaps: true };
    });

    document.getElementById('meta').textContent =
      `${ds.title.split('—')[0].trim()} · Wohnfläche ${KATEGORIE} · ${ds.rowCount.toLocaleString('de')} Zeilen gesamt`;

    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels: years, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'bottom' },
                   title: { display: true, text: `Nettokaltmiete je m², Wohnfläche ${KATEGORIE}` } },
        scales: { y: { title: { display: true, text: 'EUR/m²' } },
                  x: { title: { display: true, text: 'Jahr' } } },
      },
    });
  </script>
</body>
</html>
